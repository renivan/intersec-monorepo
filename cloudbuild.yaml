# Google Cloud Build - interSec Pipeline (intersec-monorepo)
# Configuração Dinâmica: Baixa o Android SDK e as ferramentas necessárias em tempo de execução

steps:
  # 0. Recuperar o google-services.json do Secret Manager
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret="google-services-json" > androidApp/google-services.json

  # 1. Preparar o Ambiente Android e Compilar
  - name: 'eclipse-temurin:17'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Instalar utilitários básicos
        apt-get update && apt-get install -y wget unzip

        # Criar estrutura de diretórios do Android SDK
        mkdir -p android-sdk/cmdline-tools
        
        # Baixar ferramentas de linha de comando do Android (versão estável)
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip -q sdk.zip -d android-sdk/cmdline-tools
        mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        rm sdk.zip

        # Configurar variáveis de ambiente cruciais para o Gradle
        export ANDROID_HOME=$${PWD}/android-sdk
        export PATH=$${PATH}:$${ANDROID_HOME}/cmdline-tools/latest/bin:$${ANDROID_HOME}/platform-tools

        # Aceitar licenças automaticamente
        yes | sdkmanager --licenses > /dev/null

        # Instalar Platform e Build Tools necessários para o interSec
        echo "Instalando ferramentas Android (SDK 34/35/37)..."
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null

        # Dar permissão e executar a compilação real do AAB e APK
        chmod +x gradlew
        ./gradlew clean :shared:assemble :androidApp:bundleRelease :androidApp:assembleRelease

# Configurações de performance e logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# 2. Salvar os arquivos resultantes no Google Cloud Storage
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'

# Variáveis globais para o build
substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
