# Google Cloud Build - interSec Pipeline (Otimizado v2)

steps:
  # 0. Recuperar segredos
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'fetch-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret="google-services-json" > androidApp/google-services.json

  # 1. Compilação usando a imagem customizada (Mais rápido)
  # Nota: Após subir sua imagem, troque o name abaixo para o link do seu Artifact Registry
  - name: 'eclipse-temurin:17' # Temporário até você gerar a imagem do Dockerfile.build
    id: 'gradle-build'
    env:
      - 'ANDROID_HOME=/opt/android-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Se estiver usando a imagem padrão, instala o SDK (Remover após criar imagem customizada)
        if [ ! -d "/opt/android-sdk" ]; then
          apt-get update && apt-get install -y wget unzip
          mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          export PATH=$PATH:/opt/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null
        fi
        
        chmod +x gradlew
        ./gradlew clean :shared:assemble :androidApp:bundleRelease :androidApp:assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m"

# Performance e Logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Armazenamento de Artefatos
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'

substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
