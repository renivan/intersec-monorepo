# Google Cloud Build - interSec Pipeline (Otimizado v5)
# Utiliza imagem customizada v2 com Secret Manager e SDKs pré-instalados

steps:
  # 1. Compilação usando a imagem customizada v2
  - name: 'us-central1-docker.pkg.dev/intersec-56328/intersec-images/android-builder:v2'
    id: 'gradle-build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Injeta o arquivo de serviços do Google a partir da variável de ambiente
        echo "$$GOOGLE_SERVICES_JSON" > androidApp/google-services.json
        
        chmod +x gradlew
        ./gradlew clean :shared:assemble :androidApp:assembleDebug -Dorg.gradle.jvmargs="-Xmx4096m"
    secretEnv: ['GOOGLE_SERVICES_JSON']

# Definição da integração nativa com o Secret Manager
availableSecrets:
  secretManager:
  - versionName: projects/intersec-56328/secrets/google-services-json/versions/latest
    env: 'GOOGLE_SERVICES_JSON'

# Desempenho e Logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s

# Armazenamento de Artefatos (AAB e APK)
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'
      - 'shared/build/outputs/**/*.aar'

# Variáveis (Certifique-se de configurar no Gatilho do Cloud Build)
substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
