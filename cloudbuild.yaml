# Google Cloud Build - interSec Pipeline (Otimizado v3)
# Utiliza imagem customizada com Android SDK pré-instalado para builds ultra-rápidos

steps:
  # 0. Recuperar segredos do Secret Manager
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'fetch-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p androidApp
        gcloud secrets versions access latest --secret="google-services-json" > androidApp/google-services.json

  # 1. Compilação usando a imagem customizada do interSec
  - name: 'us-central1-docker.pkg.dev/intersec-56328/intersec-images/android-builder:v1'
    id: 'gradle-build'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        chmod +x gradlew
        ./gradlew clean :shared:assemble :androidApp:bundleRelease :androidApp:assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m"

# Performance e Logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Armazenamento de Artefatos (AAB e APK)
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'

# Variável de Bucket (Certifique-se de configurar no Gatilho/Trigger do Cloud Build)
substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
