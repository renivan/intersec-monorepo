# Google Cloud Build - interSec Pipeline (intersec-monorepo)
# Usando imagem otimizada com Android SDK e ferramentas Linux completas (como xargs)

steps:
  # 1. Compilar usando o Gradle Wrapper do projeto
  # Esta imagem já contém o Android SDK, Java 17 e ferramentas essenciais de shell
  - name: 'mobiledevops/android-sdk-image:34-jdk17'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        chmod +x gradlew
        ./gradlew clean :shared:assemble :androidApp:bundleRelease :androidApp:assembleRelease

# Configurações de performance e logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# 2. Salvar os arquivos resultantes no Google Cloud Storage
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'
      - 'androidApp/build/outputs/mapping/release/mapping.txt'

# Variáveis globais para o build
substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
