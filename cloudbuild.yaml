# Google Cloud Build - interSec Pipeline (intersec-monorepo)
# Este arquivo automatiza a geração do arquivo de produção (.aab) e (.apk)

steps:
  # 1. Executar a limpeza e compilar o Shared Module
  - name: 'gcr.io/cloud-builders/gradle'
    args: [':shared:assemble']

  # 2. Compilar o App Bundle de Produção (AAB) para a Play Store
  - name: 'gcr.io/cloud-builders/gradle'
    args: [':androidApp:bundleRelease']

  # 3. Compilar o APK de Produção para GitHub Releases/Testes Manuais
  - name: 'gcr.io/cloud-builders/gradle'
    args: [':androidApp:assembleRelease']

# Configurações de performance e logs
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# 4. Salvar os arquivos resultantes no Google Cloud Storage
artifacts:
  objects:
    location: 'gs://${_ARTIFACT_BUCKET}/intersec-monorepo/builds/$BUILD_ID'
    paths:
      - 'androidApp/build/outputs/bundle/release/*.aab'
      - 'androidApp/build/outputs/apk/release/*.apk'
      - 'androidApp/build/outputs/mapping/release/mapping.txt'

# Variáveis globais para o build
substitutions:
  _ARTIFACT_BUCKET: 'intersec-artifacts-build'
